spring:
  # 配置数据源
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vibe_music?useUnicode=true&characterEncoding=utf-8&useSSL=false # 修改你的 MySQL 地址和库名
    username: root # 修改你的 MySQL 用户名
    password: 123456 # 修改你的 MySQL 密码
    type: com.alibaba.druid.pool.DruidDataSource # 配置连接池

  # Redis服务连接配置
  data:
    redis:
      database: 1
      host: 127.0.0.1
      port: 6379
      password:

  servlet:
    multipart:
      max-file-size: 100MB # 设置最大上传文件大小为100MB
      max-request-size: 100MB # 设置最大请求大小为100MB

  # 对于注解的Redis缓存数据统一设置有效期为10分钟，单位毫秒
  cache:
    redis:
      time-to-live: 600000

  # 配置邮件服务
  mail:
    # 配置邮箱账户和密码
    host: smtp.qq.com # 修改你的 SMTP 服务器地址
    username: 193685658@qq.com # 修改你的邮箱账号
    password: fwioabwopnotcbeh # 修改你的邮箱应用密码或授权码
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
          # 邮件服务超时时间配置
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

# DeepSeek API Configuration
deepseek:
  api-key: sk-ae6fa52b68af466eac0480a8b4e6a853 # 替换为你的 DeepSeek API 密钥
  base-url: https://api.deepseek.com
  model: deepseek-chat

# 配置 mybatis-plus
mybatis-plus:
  type-aliases-package:   com.example.pojo # 实体类所在的包，允许用实体类类名作为别名

  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 配置日志
    map-underscore-to-camel-case: true # 类属性与表字段的驼峰映射

  global-config:
    db-config: # 数据库配置
      table-prefix: tb_  # 表名前缀为tb_，表名为前缀连接类名（小写）

# 定义角色和路径权限的映射关系
role-path-permissions:
  permissions:
    ROLE_ADMIN:
      - "/admin/"
    ROLE_USER:
      - "/user/"
      - "/playlist/"
      - "/artist/"
      - "/song/"
      - "/favorite/"
      - "/chat/"
      - "/comment/"
      - "/banner/"
      - "/feedback/"

minio:
  endpoint: http://127.0.0.1:9000 # 修改你的 MinIO 端点
  accessKey: minioadmin # 修改你的 MinIO Access Key
  secretKey: minioadmin # 修改你的 MinIO Secret Key
  bucket: vibe-music-data # 确认 Bucket 名称与你创建的一致


# 前后端启动注意事项：
# 确保已经安装并启动了 MySQL 数据库，并创建了名为 vibe_music 的数据库。
# 请确保已经安装并启动了 Redis 服务。
# 请确保已经安装并启动了 MinIO 服务器，并创建了名为 vibe-music-data 的 Bucket。
# 请根据你的实际情况修改上述配置文件中的数据库、Redis、MinIO 和邮件服务的相关信息。
# java版本为17
# 运行 MinIO 服务器的命令（在 minio/bin 目录下运行）
# E:\IntelliJ IDEA\workspace\vibe-music\minio\bin>minio.exe server "E:\IntelliJ IDEA\workspace\vibe-music\minio\data"
# 启动Redis服务。
# admin管理端启动：npx pnpm dev
# 前端启动：npm run dev
# 后端Spring Boot启动：运行VibeMusicApplication的main方法
# 前端访问地址：http://localhost:8090
# 管理端访问地址：http://localhost:8089